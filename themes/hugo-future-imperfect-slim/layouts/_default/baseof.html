<!doctype html>
<html lang="{{ .Page.Language | default "en" }}">
  <head>
    <meta charset="UTF-8">
    <style>
        @keyframes rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .bold-rotate {
            font-weight: bold;
            display: inline-block;
            animation: rotate 2s infinite;
        }
    </style>
  </head>
  {{ partial "head" . }}
  <body>

    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KWVBJ3K4" height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    {{ partial "site-header" . }}
    <div id="wrapper">
      {{ partial "site-intro" . }}
      <main id="site-main">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "site-sidebar" . }}
      {{ partial "site-footer" . }}
      {{ partial "scripts" . }}
    </div>
    
    <div class="footer">
      <p>
        {{ (.Site.Copyright | safeHTML) | default (print " - van den <span class=\"bold-rotate\">B</span>oom \u00A9 " now.Year " - ") }}      
      </p>
    </div>

	<script>
	  if (window.netlifyIdentity) {
		window.netlifyIdentity.on("init", user => {
		  if (!user) {
			window.netlifyIdentity.on("login", () => {
			  document.location.href = "/admin/";
			});
		  }
		});
	  }
	</script>

  </body>
</html>
